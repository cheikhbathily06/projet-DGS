services:
  app:
    build: .
    container_name: dgs_app
    volumes:
      - .:/var/www
    networks:
      - dgs_network

  nginx:
    image: nginx:alpine
    container_name: dgs_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dgs_network

  db:
    image: mysql:8.0
    container_name: dgs_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dgs_track
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dgs_user
      MYSQL_PASSWORD: dgs_pass
    ports:
      - "3307:3306"
    volumes:
      - dgs_db_data:/var/lib/mysql
    networks:
      - dgs_network

networks:
  dgs_network:
    driver: bridge

volumes:
  dgs_db_data:
